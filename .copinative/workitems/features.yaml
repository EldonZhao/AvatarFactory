  - id: feat-003
    title: Discovery Agent - 热门文案搜索与灵感发现
    description: |-
      ## 概述
      创建新的 **Discovery Agent（发现代理）**，负责根据人设定位从社交平台搜索、抓取、整理相关的热门文案，为内容创作提供灵感和参考。

      ## 当前状态
      - ❌ 无热门内容发现功能
      - ❌ 无竞品/同类账号分析
      - ❌ 无趋势追踪

      ## 功能需求

      ### Phase 1: Discovery Agent 核心
      - [ ] 创建 `DiscoveryAgent` 类
      - [ ] 根据人设关键词搜索平台热门内容
      - [ ] 抓取内容标题、正文、互动数据
      - [ ] 内容去重与归档

      ### Phase 2: 智能分析
      - [ ] 热门内容模式识别（标题风格、结构、话题）
      - [ ] 提取高互动内容的共性特征
      - [ ] 生成内容灵感建议
      - [ ] 识别热门话题/趋势

      ### Phase 3: 与人设关联
      - [ ] 根据 Persona 的 `expertise`、`content_pillars` 定向搜索
      - [ ] 匹配目标受众的内容偏好
      - [ ] 过滤与人设 `boundaries.avoid` 冲突的内容

      ### Phase 4: 内容库管理
      - [ ] 热门文案库（按平台/话题分类）
      - [ ] 收藏/标记功能
      - [ ] 定期更新热门榜单
      - [ ] 与 Content Lab 集成（灵感推荐）

      ## 技术方案

      ### 新增 Agent
      ```python
      class DiscoveryAgent(BaseAgent):
          """发现热门内容的代理"""
          
          async def search_trending(self, persona: Persona, platform: PlatformType) -> List[TrendingContent]:
              """根据人设搜索热门内容"""
              pass
          
          async def analyze_patterns(self, contents: List[TrendingContent]) -> ContentPatterns:
              """分析热门内容模式"""
              pass
          
          async def get_inspiration(self, persona: Persona) -> List[ContentIdea]:
              """生成内容灵感建议"""
              pass
      ```

      ### 数据模型
      ```python
      class TrendingContent(BaseModel):
          """热门内容"""
          platform: PlatformType
          title: str
          body: str
          author: str
          likes: int
          comments: int
          shares: int
          tags: List[str]
          published_at: datetime
          url: str

      class ContentIdea(BaseModel):
          """内容灵感"""
          topic: str
          angle: str
          reference_contents: List[str]
          suggested_format: str
          estimated_engagement: str
      ```

      ### CLI 命令
      ```bash
      # 搜索热门内容
      avatarfactory discover --persona persona_xxx --platform xiaohongshu

      # 获取灵感建议
      avatarfactory inspire --persona persona_xxx

      # 查看热门榜单
      avatarfactory trending --platform xiaohongshu --topic "AI工具"
      ```

      ### 平台数据获取
      - 依赖 feat-001（社交平台 API 连接）
      - 小红书：搜索笔记 API
      - 知乎：热榜 + 搜索 API
      - Twitter：Trending + Search API

      ## 相关文件（待创建）
      ```
      avatarfactory/
      ├── agents/
      │   └── discovery.py        # Discovery Agent
      ├── models/
      │   └── schemas.py          # 添加 TrendingContent, ContentIdea
      └── core/
          └── knowledge_base.py   # 添加热门内容存储
      ```

      ## 依赖
      - feat-001: 社交平台 API 连接支持（必须先完成）

      ## 用户价值
      - 节省手动搜索热门内容的时间
      - 数据驱动的内容创作
      - 及时跟进热点话题
      - 学习优秀文案的写作模式
