    completedAt: '2026-02-04T12:21:34.263Z'
  - id: feat-002
    title: Long-Running 后台服务与通知系统
    description: |-
      ## 概述
      实现 AvatarFactory 的 long-running 后台服务模式，让各个 sub-agent 周期性执行任务，由 Orchestrator 汇总结果并通过多种渠道通知用户。

      ## 当前状态
      - ❌ 仅支持 CLI 交互式模式
      - ❌ 无后台任务调度
      - ❌ 无通知系统
      - ❌ 无周期性任务

      ## 功能需求

      ### Phase 1: 任务调度引擎
      - [ ] 实现 `TaskScheduler` 调度器
      - [ ] 支持 cron 表达式定义周期
      - [ ] 支持任务队列管理
      - [ ] 实现任务持久化（断点续跑）
      - [ ] 后台守护进程模式 (`avatarfactory daemon start`)

      ### Phase 2: Agent 周期性任务
      - [ ] **Content Lab**: 定时生成内容草稿
      - [ ] **Review Agent**: 定时审核待发布内容
      - [ ] **Simulation Agent**: 定时分析内容表现预测
      - [ ] **Persona Lab**: 定期优化人设建议
      - [ ] Orchestrator 汇总各 Agent 报告

      ### Phase 3: 通知系统
      - [ ] 定义 `NotificationProvider` 抽象接口
      - [ ] **邮件通知**: SMTP/SendGrid/AWS SES
      - [ ] **IM 通知**: 
        - 企业微信 (WeChat Work)
        - 飞书 (Lark/Feishu)
        - Slack
        - Telegram
        - Discord
      - [ ] **Webhook**: 自定义 HTTP 回调
      - [ ] **推送通知**: 可选的移动端推送

      ### Phase 4: 报告与汇总
      - [ ] 日报/周报自动生成
      - [ ] 内容表现摘要
      - [ ] 待办事项提醒
      - [ ] 异常告警（如 API 失败、内容审核不通过）

      ## 技术方案

      ### 调度框架选型
      - **APScheduler**: Python 调度库，支持 cron/interval
      - **Celery + Redis**: 分布式任务队列（如需扩展）
      - **简单方案**: asyncio + 定时循环

      ### 通知集成
      ```python
      class NotificationProvider(ABC):
          @abstractmethod
          async def send(self, message: NotificationMessage) -> bool:
              pass

      class EmailProvider(NotificationProvider): ...
      class WeChatWorkProvider(NotificationProvider): ...
      class SlackProvider(NotificationProvider): ...
      class WebhookProvider(NotificationProvider): ...
      ```

      ### CLI 扩展
      ```bash
      # 启动后台服务
      avatarfactory daemon start

      # 查看状态
      avatarfactory daemon status

      # 停止服务
      avatarfactory daemon stop

      # 配置通知
      avatarfactory notify config --provider=wechat --webhook=https://...

      # 手动触发通知测试
      avatarfactory notify test
      ```

      ### 配置示例 (.env)
      ```bash
      # 调度配置
      AVATARFACTORY_SCHEDULER_ENABLED=true
      AVATARFACTORY_CONTENT_SCHEDULE="0 9 * * *"  # 每天9点生成内容
      AVATARFACTORY_REVIEW_SCHEDULE="0 10 * * *"  # 每天10点审核
      AVATARFACTORY_REPORT_SCHEDULE="0 18 * * 5"  # 每周五18点周报

      # 通知配置
      AVATARFACTORY_NOTIFY_PROVIDER=wechat_work
      AVATARFACTORY_WECHAT_WEBHOOK=https://qyapi.weixin.qq.com/...
      AVATARFACTORY_EMAIL_SMTP_HOST=smtp.example.com
      AVATARFACTORY_EMAIL_TO=user@example.com
      ```

      ## 依赖
      - `apscheduler>=3.10.0` - 任务调度
      - `httpx>=0.25.0` - 异步 HTTP（通知发送）
      - `aiosmtplib>=3.0.0` - 异步邮件发送（可选）

      ## 相关文件（待创建）
      ```
      avatarfactory/
      ├── scheduler/
      │   ├── __init__.py
      │   ├── engine.py          # 调度引擎
      │   ├── tasks.py            # 预定义任务
      │   └── persistence.py      # 任务状态持久化
      ├── notifications/
      │   ├── __init__.py
      │   ├── base.py             # NotificationProvider 基类
      │   ├── email.py            # 邮件通知
      │   ├── wechat_work.py      # 企业微信
      │   ├── feishu.py           # 飞书
      │   ├── slack.py            # Slack
      │   └── webhook.py          # 通用 Webhook
      └── cli.py                   # 添加 daemon/notify 命令
      ```
    priority: high
    status: pending
