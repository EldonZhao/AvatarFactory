features:
  - id: feat-001
    title: 社交平台 API 连接支持
    description: |-
      ## 概述
      实现与社交平台的实际 API 连接，支持内容发布、数据获取等功能。

      ## 目标平台
      1. **小红书 (XHS)** - 优先级最高
      2. 知乎
      3. Twitter/X

      ## 功能需求

      ### Phase 1: 小红书连接
      - [ ] 创建 `xiaohongshu.py` adapter（当前文件缺失）
      - [ ] 实现 OAuth/Cookie 认证
      - [ ] 实现内容发布 API
      - [ ] 实现笔记数据获取
      - [ ] 实现评论/互动数据获取

      ### Phase 2: 通用平台接口
      - [ ] 定义 `BasePlatformConnector` 抽象类
      - [ ] 实现认证管理（token 存储/刷新）
      - [ ] 实现发布队列
      - [ ] 实现数据同步

      ### Phase 3: 其他平台
      - [ ] 知乎 API 连接
      - [ ] Twitter API 连接

      ## 技术考虑
      - 使用 httpx/aiohttp 进行异步 HTTP 请求
      - 安全存储 API credentials
      - 遵守各平台 API 使用限制
      - 人工确认发布（human-in-the-loop）

      ## 当前状态
      - adapters 目录存在但只有格式化功能
      - `xiaohongshu.py` 文件缺失（被 `__init__.py` 引用但不存在）
      - 无实际 API 连接代码
    priority: high
    status: completed
    createdAt: '2026-02-04T11:51:00.132Z'
