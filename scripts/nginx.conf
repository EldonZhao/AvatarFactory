worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Upstream servers
    upstream api {
        server 127.0.0.1:8000;
    }

    upstream monitor {
        server 127.0.0.1:4321;
    }

    upstream journal {
        server 127.0.0.1:4322;
    }

    upstream admin {
        server 127.0.0.1:4323;
    }

    server {
        listen 80;
        server_name _;

        # Root redirect to Journal (main public site)
        location = / {
            return 301 /journal/;
        }

        # Avatar Monitor SSR (formerly Chronicle) - proxy to Node.js server
        location /monitor/ {
            proxy_pass http://monitor/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Monitor static assets (higher priority for caching)
        location /monitor/assets/ {
            proxy_pass http://monitor/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Redirect /monitor to /monitor/
        location = /monitor {
            return 301 /monitor/;
        }

        # Avatar Journal SSR - blog site
        location /journal/ {
            proxy_pass http://journal/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Journal static assets
        location /journal/assets/ {
            proxy_pass http://journal/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Redirect /journal to /journal/
        location = /journal {
            return 301 /journal/;
        }

        # Admin Dashboard SSR - proxy to Node.js server
        location /admin/ {
            proxy_pass http://admin/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin static assets
        location /admin/assets/ {
            proxy_pass http://admin/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Redirect /admin to /admin/
        location = /admin {
            return 301 /admin/;
        }

        # API endpoints - route to FastAPI
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /docs {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /openapi.json {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /redoc {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API routes without /api prefix (lowercase paths only)
        location ~ "^/(personas|content|tasks|connectors|topology|chat|generate|discover|publish|schedule|scheduler)(/.*)?$" {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
